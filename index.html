<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday ❤️</title>
    <style>
        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(#ffd6e0, #ff9bb3);
            color: #333;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        h1,
        h2 {
            color: #d81b60;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            line-height: 1.3;
        }

        .hidden {
            display: none !important;
        }

        .btn {
            background: linear-gradient(45deg, #ff4081, #d81b60);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.3rem;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(216, 27, 96, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 8px rgba(216, 27, 96, 0.4);
        }

        /* Screen 1: Puzzle */
        .puzzle-container {
            width: 300px;
            height: 475px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            gap: 2px;
            background: #fff;
            padding: 2px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: gap 0.5s, padding 0.5s;
        }

        .puzzle-container.solved {
            gap: 0;
            padding: 0;
            background: transparent;
        }

        .puzzle-piece {
            width: 100%;
            height: 100%;
            background-color: #ffb6c1;
            /* Fallback */
            background-image: url('image/image1.jpg');
            background-size: 300px 475px;
            border-radius: 8px;
            transition: transform 0.2s, border 0.2s, border-radius 0.5s;
            cursor: pointer;
        }

        .puzzle-piece.solved {
            border-radius: 0;
        }

        .puzzle-piece.selected {
            transform: scale(0.92);
            border: 3px solid #ff4081;
            box-shadow: 0 0 10px rgba(255, 64, 129, 0.5);
        }

        /* Screen 2: Scratch Card */
        .scratch-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            background: white;
        }

        .scratch-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: url('image/image2.jpg') center/cover no-repeat;
        }

        .scratch-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            background: rgba(255, 240, 243, 0.4);
        }

        .scratch-message {
            font-size: 1.6rem;
            color: #d81b60;
            font-weight: bold;
            line-height: 1.4;
            position: relative;
            z-index: 1;
            text-shadow: 0 1px 8px rgba(255, 255, 255, 0.9);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            z-index: 2;
        }

        /* Screen 3: Gift Box */
        .gifts {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .gift-box {
            font-size: 4rem;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .gift-box:active {
            transform: scale(0.8);
        }

        #gift-msg {
            margin-top: 30px;
            font-size: 1.6rem;
            color: #d81b60;
            font-weight: bold;
            min-height: 60px;
        }

        /* Screen 4: Balloons */
        .balloon-container {
            position: relative;
            width: 100%;
            height: 50vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .balloon-wrapper {
            width: 80px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .balloon {
            font-size: 4.5rem;
            cursor: pointer;
            transition: transform 0.2s;
            animation: float 3s ease-in-out infinite alternate;
        }

        .balloon:nth-child(2) {
            animation-delay: 0.5s;
        }

        .balloon:nth-child(3) {
            animation-delay: 1s;
        }

        .balloon:nth-child(4) {
            animation-delay: 1.5s;
        }

        .balloon:nth-child(5) {
            animation-delay: 2s;
        }

        .balloon:active {
            transform: scale(0.8);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            100% {
                transform: translateY(-15px);
            }
        }

        .popped-text {
            font-size: 1.2rem;
            color: #d81b60;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            animation: popIn 0.3s ease-out;
            text-align: center;
        }

        #final-msg {
            font-size: 2.2rem;
            color: #c2185b;
            font-weight: bold;
            margin-top: 40px;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            80% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Utility */
        .heart {
            color: #e91e63;
        }

        /* Floating Background Items */
        .bg {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .item {
            position: absolute;
            opacity: 0.6;
            animation: float linear infinite;
        }

        .item:nth-child(1) {
            left: 5%;
            font-size: 18px;
            animation-duration: 12s;
        }

        .item:nth-child(2) {
            left: 15%;
            font-size: 24px;
            animation-duration: 10s;
            animation-delay: 2s;
        }

        .item:nth-child(3) {
            left: 25%;
            font-size: 16px;
            animation-duration: 14s;
            animation-delay: 4s;
        }

        .item:nth-child(4) {
            left: 35%;
            font-size: 28px;
            animation-duration: 11s;
            animation-delay: 1s;
        }

        .item:nth-child(5) {
            left: 45%;
            font-size: 20px;
            animation-duration: 13s;
            animation-delay: 3s;
        }

        .item:nth-child(6) {
            left: 55%;
            font-size: 22px;
            animation-duration: 9s;
            animation-delay: 5s;
        }

        .item:nth-child(7) {
            left: 65%;
            font-size: 14px;
            animation-duration: 15s;
            animation-delay: 2s;
        }

        .item:nth-child(8) {
            left: 75%;
            font-size: 26px;
            animation-duration: 10s;
            animation-delay: 6s;
        }

        .item:nth-child(9) {
            left: 85%;
            font-size: 18px;
            animation-duration: 12s;
            animation-delay: 1s;
        }

        .item:nth-child(10) {
            left: 92%;
            font-size: 20px;
            animation-duration: 11s;
            animation-delay: 4s;
        }

        @keyframes float {
            from {
                transform: translateY(100vh) scale(0.8);
            }

            to {
                transform: translateY(-10vh) scale(1.2);
            }
        }
    </style>
</head>

<body>

    <!-- Floating Background -->
    <div class="bg">
        <span class="item">💖</span>
        <span class="item">🌹</span>
        <span class="item">💗</span>
        <span class="item">🌹</span>
        <span class="item">💖</span>
        <span class="item">🌷</span>
        <span class="item">💕</span>
        <span class="item">🌹</span>
        <span class="item">💗</span>
        <span class="item">💖</span>
    </div>

    <!-- Audio Elements -->
    <audio id="bg-music" src="background.mp3" loop autoplay preload="auto"></audio>
    <audio id="voice-audio" src="gift_audio.m4a" preload="auto"></audio>

    <!-- SCREEN 1: Photo Puzzle -->
    <div id="screen1" class="screen active">
        <h2>Happy Birthday <span class="heart">❤️</span><br>Photo complete karo 😊</h2>
        <div id="puzzle-container-wrapper" style="position: relative; width: 300px; height: 475px;">
            <div id="puzzle-container" class="puzzle-container"></div>
            <div id="final-photo" class="puzzle-container hidden" style="position: absolute; top: 0; left: 0; background-image: url('image/image1.jpg'); background-size: 300px 475px; border-radius: 12px; gap: 0; padding: 0;"></div>
        </div>
        <button id="next-btn-1" class="btn hidden" onclick="showScreen(2)">Next</button>
    </div>

    <!-- SCREEN 2: Scratch Card -->
    <div id="screen2" class="screen">
        <div class="scratch-wrapper">
            <div class="scratch-content">
                <div class="scratch-message">Nakali mithaiyo k daur mein,<br>Ek dum sudhh rasgulla ho tum... 💕😘</div>
            </div>
            <canvas id="scratch-canvas"></canvas>
        </div>
        <button id="next-btn-2" class="btn" onclick="showScreen(3)">Next</button>
    </div>

    <!-- SCREEN 3: Gift Selection -->
    <div id="screen3" class="screen">
        <h2>Gift chahiye ? 🎁</h2>
        <div class="gifts" id="gifts-container">
            <!-- Populated via JS -->
        </div>
        <div id="gift-msg"></div>
        <button id="voice-btn" class="btn hidden" onclick="playVoiceAndNext()">Play Voice 🎵</button>
    </div>

    <!-- SCREEN 4: Balloon Pop Final -->
    <div id="screen4" class="screen">
        <h2>Tap the Balloons 😉 </h2>
        <div class="balloon-container" id="balloon-container">
            <!-- Balloons generated via JS -->
        </div>
        <div id="final-msg" class="hidden">Happy Birthday meri jaan <span class="heart">❤️</span></div>
    </div>

    <script>
        // Global Navigation
        function showScreen(num) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const screen = document.getElementById('screen' + num);
            if (screen) {
                screen.classList.add('active');
                // Give browser a moment to layout before initializing canvas/balloons
                if (num === 2) setTimeout(initScratchCard, 100);
                if (num === 4) setTimeout(initBalloons, 100);
            }
        }

        // Auto-play background music on any interaction
        function startMusic() {
            const bgMusic = document.getElementById('bg-music');
            if (bgMusic) {
                bgMusic.play().then(() => {
                    // Remove all listeners once playing
                    ['click', 'pointerdown', 'touchstart', 'mousedown', 'keydown'].forEach(ev => {
                        document.removeEventListener(ev, startMusic);
                    });
                }).catch(e => {
                    // Still trying...
                });
            }
        }
        ['click', 'pointerdown', 'touchstart', 'mousedown', 'keydown'].forEach(ev => {
            document.addEventListener(ev, startMusic);
        });

        // === SCREEN 1: Puzzle Logic ===
        const puzzleContainer = document.getElementById('puzzle-container');
        let puzzleSolved = false;
        if (puzzleContainer) {
            // DEBUG CHEAT: Click the puzzle title 3 times to skip it
            let titleClick = 0;
            const h2 = document.querySelector('#screen1 h2');
            if (h2) {
                h2.onclick = () => {
                    titleClick++;
                    if (titleClick >= 3) {
                        puzzleSolved = true;
                        document.getElementById('puzzle-container').classList.add('hidden');
                        document.getElementById('final-photo').classList.remove('hidden');
                        document.getElementById('next-btn-1').classList.remove('hidden');
                    }
                };
            }

            let order = [0, 1, 2, 3, 4, 5, 6, 7];
            // Shuffle ensuring it's not already solved
            do {
                order.sort(() => Math.random() - 0.5);
            } while (order.every((val, i) => val === i));

            let draggedPiece = null;
            let ghostPiece = null;
            let offsetX = 0;
            let offsetY = 0;
            const positions = [
                '0 0', '-150px 0',
                '0 -118.75px', '-150px -118.75px',
                '0 -237.5px', '-150px -237.5px',
                '0 -356.25px', '-150px -356.25px'
            ];

            function swapPieces(p1, p2) {
                // Visual pop animation during swap
                p1.style.transform = 'scale(0.8)';
                p2.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    p1.style.transform = 'scale(1)';
                    p2.style.transform = 'scale(1)';
                }, 150);

                let tempVal = p1.dataset.currentVal;
                p1.dataset.currentVal = p2.dataset.currentVal;
                p2.dataset.currentVal = tempVal;

                p1.style.backgroundPosition = positions[p1.dataset.currentVal];
                p2.style.backgroundPosition = positions[p2.dataset.currentVal];

                checkPuzzle();
            }

            order.forEach((val, index) => {
                let div = document.createElement('div');
                div.className = 'puzzle-piece';
                div.style.backgroundPosition = positions[val];
                div.dataset.currentVal = val;

                div.addEventListener('pointerdown', pointerDownHandler);
                puzzleContainer.appendChild(div);
            });

            function pointerDownHandler(e) {
                if (puzzleSolved) return;
                if (e.button !== undefined && e.button !== 0) return;

                draggedPiece = this;
                this.classList.add('selected');

                let rect = this.getBoundingClientRect();
                offsetX = e.clientX - rect.left;
                offsetY = e.clientY - rect.top;

                ghostPiece = this.cloneNode(true);
                ghostPiece.classList.remove('selected');
                ghostPiece.style.position = 'fixed';
                ghostPiece.style.zIndex = '1000';
                ghostPiece.style.pointerEvents = 'none';
                ghostPiece.style.opacity = '0.9';
                ghostPiece.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
                ghostPiece.style.width = rect.width + 'px';
                ghostPiece.style.height = rect.height + 'px';
                ghostPiece.style.margin = '0';
                ghostPiece.style.transition = 'none';

                document.body.appendChild(ghostPiece);
                moveGhost(e.clientX, e.clientY);

                this.style.opacity = '0.3';

                document.addEventListener('pointermove', pointerMoveHandler);
                document.addEventListener('pointerup', pointerUpHandler);
                document.addEventListener('pointercancel', pointerUpHandler);

                e.preventDefault();
            }

            function moveGhost(x, y) {
                if (!ghostPiece) return;
                ghostPiece.style.left = (x - offsetX) + 'px';
                ghostPiece.style.top = (y - offsetY) + 'px';
            }

            function pointerMoveHandler(e) {
                if (!draggedPiece) return;
                e.preventDefault();
                moveGhost(e.clientX, e.clientY);
            }

            function pointerUpHandler(e) {
                document.removeEventListener('pointermove', pointerMoveHandler);
                document.removeEventListener('pointerup', pointerUpHandler);
                document.removeEventListener('pointercancel', pointerUpHandler);

                if (!draggedPiece) return;

                draggedPiece.classList.remove('selected');
                draggedPiece.style.opacity = '1';

                if (ghostPiece) {
                    ghostPiece.remove();
                    ghostPiece = null;
                }

                let target = document.elementFromPoint(e.clientX, e.clientY);

                if (target && target.classList.contains('puzzle-piece') && target !== draggedPiece) {
                    swapPieces(draggedPiece, target);
                }
                draggedPiece = null;
            }

            function checkPuzzle() {
                if (puzzleSolved) return;
                let pieces = document.querySelectorAll('.puzzle-piece');
                let solved = true;
                pieces.forEach((p, i) => {
                    if (parseInt(p.dataset.currentVal) !== i) solved = false;
                });
                if (solved) {
                    puzzleSolved = true;
                    // Hide pieces and show original image
                    document.getElementById('puzzle-container').classList.add('hidden');
                    document.getElementById('final-photo').classList.remove('hidden');
                    
                    setTimeout(() => {
                        document.getElementById('next-btn-1').classList.remove('hidden');
                    }, 800);
                }
            }
        } // end if puzzleContainer

        // === SCREEN 2: Scratch Card Logic ===
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        let isDrawing = false;
        let scratched = false;

        function initScratchCard() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            // Fill with metallic-looking gradient
            let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#e0e0e0');
            gradient.addColorStop(0.5, '#bdbdbd');
            gradient.addColorStop(1, '#9e9e9e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add text overlay
            ctx.fillStyle = '#666';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Scratch Me!', canvas.width / 2, canvas.height / 2);

            canvas.addEventListener('mousedown', startScratch);
            canvas.addEventListener('mousemove', scratch);
            canvas.addEventListener('mouseup', endScratch);
            canvas.addEventListener('mouseleave', endScratch);

            canvas.addEventListener('touchstart', startScratch, { passive: false });
            canvas.addEventListener('touchmove', scratch, { passive: false });
            canvas.addEventListener('touchend', endScratch);
        }

        function getPos(e) {
            let rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startScratch(e) {
            isDrawing = true;
            scratch(e);
        }

        let scratchCount = 0;
        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault();
            let pos = getPos(e);

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 30, 0, Math.PI * 2);
            ctx.fill();

            scratchCount++;
            if (scratchCount % 15 === 0) checkScratch();
        }

        function endScratch() {
            isDrawing = false;
            checkScratch();
        }

        function checkScratch() {
            if (scratched) return;
            let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            let transparent = 0;
            // Check every 4th pixel for alpha channel
            for (let i = 3; i < imgData.length; i += 16) {
                if (imgData[i] < 128) transparent++;
            }
            let totalPixelsToCheck = imgData.length / 16;
            let percent = transparent / totalPixelsToCheck;

            if (percent > 0.60) { // Roughly 60% scratched
                scratched = true;
                canvas.style.transition = 'opacity 0.5s';
                canvas.style.opacity = '0';
                setTimeout(() => {
                    canvas.style.display = 'none';
                    document.getElementById('next-btn-2').classList.remove('hidden');
                }, 500);
            }
        }

        // === SCREEN 3: Gift Selection Logic ===
        let giftFound = false;
        let giftClicks = 0;
        const giftsContainer = document.getElementById('gifts-container');

        for (let i = 0; i < 3; i++) {
            let g = document.createElement('div');
            g.className = 'gift-box';
            g.innerText = '🎁';
            g.onclick = function () { checkGift(this); };
            giftsContainer.appendChild(g);
        }

        function checkGift(el) {
            if (giftFound || el.style.opacity === '0.5') return;

            const msgEl = document.getElementById('gift-msg');
            const voiceBtn = document.getElementById('voice-btn');

            giftClicks++;

            if (giftClicks === 3) {
                giftFound = true;
                msgEl.innerText = 'Yeh raha tumhara gift ❤️';
                el.innerText = '🎉'; // Open box
                voiceBtn.classList.remove('hidden');
            } else {
                if (giftClicks === 2) {
                    msgEl.innerText = 'Arre ye wala bhi nahi 😄';

                } else {
                    msgEl.innerText = 'Arre ye wala nahi 😄';

                }
                el.style.opacity = '0.5';
            }
        }

        function playVoiceAndNext() {
            const audio = document.getElementById('voice-audio');
            const bgMusic = document.getElementById('bg-music');
            const btn = document.getElementById('voice-btn');

            btn.innerText = 'Playing... 🎵';
            btn.disabled = true;

            // Lower background music volume while playing voice
            if (bgMusic) bgMusic.volume = 0.1;

            // Play audio
            audio.currentTime = 0;
            audio.play().then(() => {
                // When audio ends, move to next screen
                audio.onended = function () {
                    if (bgMusic) bgMusic.volume = 1.0;
                    showScreen(4);
                };
                // Fallback: if audio is longer than 30s, move anyway
                setTimeout(() => {
                    if (bgMusic) bgMusic.volume = 1.0;
                    showScreen(4);
                }, 30000);
            }).catch(e => {
                console.log('Audio play failed:', e);
                if (bgMusic) bgMusic.volume = 1.0;
                // If audio fails, still allow moving forward
                btn.innerText = 'Next ➡️';
                btn.disabled = false;
                btn.onclick = function () { showScreen(4); };
            });
        }

        // === SCREEN 4: Balloon Pop Logic ===
        const balloonMessages = ["I love you ❤️", "Miss you🫂", "Telegram pe chalo😉", "😋 💋 🍆 🍑 ", "Jaldi aaoooo ❤️"];
        let poppedCount = 0;

        function initBalloons() {
            const container = document.getElementById('balloon-container');
            container.innerHTML = '';
            poppedCount = 0;
            document.getElementById('final-msg').classList.add('hidden');

            balloonMessages.forEach((msg, i) => {
                let wrapper = document.createElement('div');
                wrapper.className = 'balloon-wrapper';

                let b = document.createElement('div');
                b.className = 'balloon';
                b.innerText = '🎈';
                // Randomize animation slightly
                b.style.animationDelay = (Math.random() * 2) + 's';

                b.onclick = function () {
                    if (this.dataset.popped === "true") return;
                    this.dataset.popped = "true";

                    wrapper.innerHTML = `<div class="popped-text">${msg}</div>`;
                    poppedCount++;

                    if (poppedCount === balloonMessages.length) {
                        setTimeout(() => {
                            document.getElementById('final-msg').classList.remove('hidden');
                        }, 800);
                    }
                };
                wrapper.appendChild(b);
                container.appendChild(wrapper);
            });
        }
    </script>
</body>

</html>
